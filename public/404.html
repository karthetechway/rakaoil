<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>J Oil Mill Billing</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Redirects /chekku-billing/anything to /chekku-billing/?p=/anything
    // then index.html picks it up
    var seg = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting…</body>
</html>
